name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          mkdir -p deploy/noteblock-studio
          cd noteblock-studio
          npm install
          npm run build

          cd .. 
          cp -r noteblock-studio/dist/* deploy/noteblock-studio/
          
          cp index.html deploy/ 2>/dev/null || true
          cp -r assets deploy/ 2>/dev/null || true
        env:
          CI: false 

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: gh-pages