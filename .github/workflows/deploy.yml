name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build
        env:
          # This ensures that the build doesn't fail on warnings if you have any
          CI: false 

      - name: Debug 🔍
        run: |
          echo "Checking if dist exists..."
          ls -la
          if [ -d "dist" ]; then
            echo "dist directory found!"
            ls -la dist
          else
            echo "dist directory NOT found!"
          fi

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages