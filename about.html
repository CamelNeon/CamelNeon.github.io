<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="/assets/Style/global.css">
    <link rel="stylesheet" href="/assets/Style/contact.css">
    <style>
        /* Basic reset to remove default browser margins */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Center content and add a nice gradient background */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }

        /* Styling the main content box */
        .card {
            background-color: white;
            padding: 3rem 4rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 90%; /* Ensures it looks good on mobile */
        }

        /* Styling the text */
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.6;
            color: #2c3e50;
        }

        /* Adding a subtle pulsing animation to the ellipsis */
        .ellipsis {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>At some point this will list my projects and accomplishments<span class="ellipsis">...</span></h1>
    </div>

    <script src="/assets/Scripts/header.js"></script>
</body>
</html>
